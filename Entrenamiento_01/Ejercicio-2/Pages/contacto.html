<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <header>
        <nav>
            <ul class="nav">
                <li><a href="../index.html">Home</a></li>
                <li>|</li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form action="/procesar-datos" method="POST">
            <div class="divForm">
                <label for="usuario">Nombre:</label>
                <input type="text" id="usuario" name="username" required>
            </div>

            <div class="divForm">
                <label for="mail">E-mail:</label>
                <input type="email" id="mail" name="mail" required>
            </div>

            <div class="divForm">
                <label for="telefono">Tel.:</label>
                <input type="text" id="telefono" name="telefono" required>
            </div>

            <div class="divForm">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" id="mail" name="user_message"></textarea>
            </div>

            <div class="divForm">
                <button id="Enviar" type="submit">Enviar Formulario</button>
                <button id="Cancelar" type="reset">Cancelar</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p>Todos los derechos reservados</p>
    </footer>
</body>

</html>
